name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          xcodebuild build \
            -project YepAnywhere.xcodeproj \
            -scheme YepAnywhere \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath $PWD/build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | xcpretty

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "YepAnywhere.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r YepAnywhere.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: YepAnywhere-iOS
          path: build/YepAnywhere.ipa
          retention-days: 30
